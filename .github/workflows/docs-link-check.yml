name: Docs link check

on:
  push:
    branches: ['**']
  pull_request:

permissions: {}

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        # Pinned to avoid supply-chain risk (tag mutability)
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Check for broken docs links
        run: |
          chmod +x .github/scripts/check-docs-links.sh
          .github/scripts/check-docs-links.sh .

      - name: Notify Slack on failure
        if: >-
          failure() &&
          (
            github.event_name == 'push' ||
            (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
          )
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_SHA: ${{ github.sha }}
        run: python3 .github/scripts/send-slack-notification.py
